version: "3.8"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: toolshub
      POSTGRES_USER: toolshub
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toolshub"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://toolshub:localdev@postgres:5432/toolshub
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      YOUR_SECRET_DEEPGRAM: ${YOUR_SECRET_DEEPGRAM}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      NODE_ENV: production
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
